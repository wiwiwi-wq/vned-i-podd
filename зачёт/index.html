<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление задачами</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Управление задачами</h1>
        </header>

        <div class="controls">
            <button id="addTaskBtn" class="btn btn-primary">+ Добавить задачу</button>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="new">Новые</button>
                <button class="filter-btn" data-filter="in-progress">В работе</button>
                <button class="filter-btn" data-filter="completed">Завершенные</button>
            </div>
        </div>

        <div id="taskModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="modalTitle">Новая задача</h2>
                <form id="taskForm">
                    <div class="form-group">
                        <label for="taskTitle">Название *</label>
                        <input type="text" id="taskTitle" required>
                    </div>
                    <div class="form-group">
                        <label for="taskDescription">Описание</label>
                        <textarea id="taskDescription" rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="taskPriority">Приоритет</label>
                        <select id="taskPriority">
                            <option value="low">Низкий</option>
                            <option value="medium" selected>Средний</option>
                            <option value="high">Высокий</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                        <button type="button" class="btn btn-secondary" id="cancelBtn">Отмена</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="taskList" class="task-list">
        </div>
    </div>

    <script src="js/Task.js"></script>
    <script src="js/TaskManager.js"></script>
    <script src="js/UI.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
